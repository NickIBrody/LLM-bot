<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AI Chat</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg:      #0d0d0f;
  --surface: #141416;
  --card:    #1a1a1e;
  --border:  rgba(255,255,255,0.06);
  --accent:  #6d28d9;
  --accent2: #8b5cf6;
  --text:    #f1f0f5;
  --muted:   #6b7280;
  --user-msg: linear-gradient(160deg,#6d28d9,#8b5cf6);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── HEADER ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 10px; }
.avatar {
  width: 34px; height: 34px;
  border-radius: 10px;
  background: var(--user-msg);
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
}
.header-title { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }
.header-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
.model-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 10px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 12px;
  color: var(--muted);
  cursor: pointer;
  transition: border-color 0.2s;
}
.model-pill:active { border-color: var(--accent2); }
.model-pill-icon { font-size: 14px; }

/* ── BOTTOM SHEET ── */
.overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 50;
  align-items: flex-end;
}
.overlay.open { display: flex; animation: fadein .2s; }
@keyframes fadein { from{opacity:0} to{opacity:1} }

.sheet {
  width: 100%;
  background: var(--surface);
  border-radius: 16px 16px 0 0;
  padding: 0 0 calc(20px + env(safe-area-inset-bottom));
  animation: slideup .22s cubic-bezier(.32,.72,0,1);
}
@keyframes slideup { from{transform:translateY(100%)} to{transform:translateY(0)} }

.sheet-drag {
  width: 32px; height: 3px;
  background: var(--border);
  border-radius: 2px;
  margin: 12px auto 0;
}
.sheet-head {
  padding: 14px 16px 10px;
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: .05em;
  text-transform: uppercase;
}
.model-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 16px;
  cursor: pointer;
  transition: background .15s;
  position: relative;
}
.model-row:active { background: var(--card); }
.model-row.active { background: rgba(109,40,217,.08); }
.model-row-icon {
  width: 38px; height: 38px;
  border-radius: 10px;
  background: var(--card);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.model-row.active .model-row-icon { background: rgba(109,40,217,.2); }
.model-row-text { flex: 1; }
.model-row-name { font-size: 14px; font-weight: 500; }
.model-row-desc { font-size: 12px; color: var(--muted); margin-top: 1px; }
.check-icon { color: var(--accent2); font-size: 16px; flex-shrink: 0; }

/* ── MESSAGES ── */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px 14px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  scroll-behavior: smooth;
}
.messages::-webkit-scrollbar { display: none; }

/* Empty state */
.empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  pointer-events: none;
}
.empty-icon {
  width: 56px; height: 56px;
  border-radius: 16px;
  background: var(--card);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  border: 1px solid var(--border);
}
.empty-title { font-size: 16px; font-weight: 600; }
.empty-sub { font-size: 13px; color: var(--muted); text-align: center; max-width: 200px; line-height: 1.4; }

/* Message bubbles */
.msg { display: flex; align-items: flex-end; gap: 8px; }
.msg.user { flex-direction: row-reverse; }
.msg + .msg.bot,
.msg + .msg.user { margin-top: 2px; }
.msg.bot + .msg.user,
.msg.user + .msg.bot { margin-top: 10px; }

.bubble {
  max-width: 82%;
  padding: 9px 13px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.55;
  word-break: break-word;
}
.msg.bot .bubble {
  background: var(--card);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
  color: var(--text);
}
.msg.user .bubble {
  background: var(--user-msg);
  border-bottom-right-radius: 4px;
  color: #fff;
}

/* Typing */
.typing { display: flex; gap: 4px; align-items: center; padding: 2px 0; }
.typing span {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--muted);
  animation: blink 1.3s infinite;
}
.typing span:nth-child(2) { animation-delay: .2s; }
.typing span:nth-child(3) { animation-delay: .4s; }
@keyframes blink { 0%,80%,100%{opacity:.3;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }

/* ── INPUT ── */
.input-bar {
  padding: 10px 12px;
  padding-bottom: calc(10px + env(safe-area-inset-bottom));
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: flex-end;
  gap: 8px;
  flex-shrink: 0;
}
.input-box {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 9px 13px;
  transition: border-color .2s;
}
.input-box:focus-within { border-color: var(--accent); }
textarea {
  width: 100%;
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-size: 15px;
  font-family: inherit;
  resize: none;
  max-height: 110px;
  min-height: 22px;
  line-height: 1.45;
  display: block;
}
textarea::placeholder { color: var(--muted); }

.send {
  width: 38px; height: 38px;
  border-radius: 12px;
  background: var(--accent);
  border: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: opacity .15s, transform .1s;
}
.send:active { transform: scale(.9); }
.send:disabled { opacity: .35; }
.send svg { width: 16px; height: 16px; fill: #fff; }

/* Code */
.bubble pre { background: rgba(0,0,0,.35); border-radius: 8px; padding: 9px; margin: 5px 0; overflow-x: auto; font-size: 12px; }
.bubble code { background: rgba(0,0,0,.25); padding: 1px 5px; border-radius: 4px; font-size: 12px; }
.bubble pre code { background: none; padding: 0; }
.bubble strong { font-weight: 600; }

@keyframes pop { from{opacity:0;transform:scale(.96) translateY(6px)} to{opacity:1;transform:none} }
.msg { animation: pop .18s ease-out; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="avatar" id="headerIcon">⚡</div>
    <div>
      <div class="header-title">AI Chat</div>
      <div class="header-sub" id="headerSub">Grok 4.1 Fast</div>
    </div>
  </div>
  <div class="model-pill" onclick="openSheet()">
    <span class="model-pill-icon" id="pillIcon">⚡</span>
    <span id="pillName">Grok 4.1</span>
    <svg width="10" height="10" viewBox="0 0 10 10" fill="none" style="opacity:.4">
      <path d="M2 4l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
</div>

<!-- Model sheet -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="sheet">
    <div class="sheet-drag"></div>
    <div class="sheet-head">Модель</div>
    <div id="sheetList"></div>
  </div>
</div>

<!-- Messages -->
<div class="messages" id="messages">
  <div class="empty" id="empty">
    <div class="empty-icon">⚡</div>
    <div class="empty-title">Начни диалог</div>
    <div class="empty-sub">Задай любой вопрос</div>
  </div>
</div>

<!-- Input -->
<div class="input-bar">
  <div class="input-box">
    <textarea id="inp" placeholder="Сообщение" rows="1"
      onkeydown="onKey(event)" oninput="resize(this)"></textarea>
  </div>
  <button class="send" id="sendBtn" onclick="send()">
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.expand(); tg.setHeaderColor && tg.setHeaderColor('#141416'); tg.setBackgroundColor && tg.setBackgroundColor('#0d0d0f'); }

const MODELS = {
  "x-ai/grok-4.1-fast":       { i:"⚡", n:"Grok 4.1 Fast",     s:"Быстрый, прямолинейный" },
  "anthropic/claude-3-haiku": { i:"🔵", n:"Claude 3 Haiku",    s:"Точный, понимает контекст" },
  "qwen/qwen3-32b":            { i:"🟠", n:"Qwen3 32B",         s:"Логика и рассуждения" },
  "qwen/qwen3-30b-a3b":       { i:"🟡", n:"Qwen3 30B A3B",     s:"MoE — быстрая и эффективная" },
  "qwen/qwen3-coder-flash":   { i:"🟢", n:"Qwen3 Coder",       s:"Код и дебаггинг" },
};

let model = "x-ai/grok-4.1-fast";
let history = [];
let busy = false;

function setModel(id) {
  model = id;
  const m = MODELS[id];
  document.getElementById('headerIcon').textContent = m.i;
  document.getElementById('headerSub').textContent = m.n;
  document.getElementById('pillIcon').textContent = m.i;
  document.getElementById('pillName').textContent = m.n.split(' ').slice(0,2).join(' ');
}

function buildSheet() {
  document.getElementById('sheetList').innerHTML = Object.entries(MODELS).map(([id, m]) => `
    <div class="model-row ${id===model?'active':''}" onclick="pickModel('${id}')">
      <div class="model-row-icon">${m.i}</div>
      <div class="model-row-text">
        <div class="model-row-name">${m.n}</div>
        <div class="model-row-desc">${m.s}</div>
      </div>
      ${id===model ? '<span class="check-icon">✓</span>' : ''}
    </div>`).join('');
}

function openSheet() {
  buildSheet();
  document.getElementById('overlay').classList.add('open');
  if (tg) tg.HapticFeedback?.impactOccurred('light');
}

function overlayClick(e) {
  if (e.target === document.getElementById('overlay'))
    document.getElementById('overlay').classList.remove('open');
}

function pickModel(id) {
  if (id !== model) { setModel(id); history = []; }
  document.getElementById('overlay').classList.remove('open');
  if (tg) tg.HapticFeedback?.selectionChanged();
}

function resize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}

function fmt(t) {
  return t
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```[\w]*\n?([\s\S]*?)```/g,'<pre><code>$1</code></pre>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/\n/g,'<br>');
}

function addMsg(role, text) {
  document.getElementById('empty')?.remove();
  const msgs = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  d.innerHTML = `<div class="bubble">${fmt(text)}</div>`;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
  return d.querySelector('.bubble');
}

function addTyping() {
  document.getElementById('empty')?.remove();
  const msgs = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'msg bot'; d.id = 'typing';
  d.innerHTML = `<div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

async function send() {
  if (busy) return;
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text) return;

  inp.value = ''; inp.style.height = 'auto';
  busy = true;
  document.getElementById('sendBtn').disabled = true;
  if (tg) tg.HapticFeedback?.impactOccurred('light');

  history.push({ role: 'user', content: text });
  addMsg('user', text);
  addTyping();

  const msgs = document.getElementById('messages');
  let bubble = null, full = '';

  try {
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history, model }),
    });
    const reader = r.body.getReader();
    const dec = new TextDecoder();
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      for (const line of dec.decode(value).split('\n')) {
        if (!line.startsWith('data: ')) continue;
        const d = line.slice(6);
        if (d === '[DONE]') break;
        try {
          const j = JSON.parse(d);
          if (j.text) {
            if (!bubble) { document.getElementById('typing')?.remove(); bubble = addMsg('bot',''); }
            full += j.text;
            bubble.innerHTML = fmt(full);
            msgs.scrollTop = msgs.scrollHeight;
          }
        } catch {}
      }
    }
    if (full) history.push({ role: 'assistant', content: full });
    if (history.length > 20) history = history.slice(-20);
  } catch {
    document.getElementById('typing')?.remove();
    addMsg('bot', 'Ошибка соединения');
  }

  busy = false;
  document.getElementById('sendBtn').disabled = false;
  if (tg) tg.HapticFeedback?.notificationOccurred('success');
}
</script>
</body>
</html>
